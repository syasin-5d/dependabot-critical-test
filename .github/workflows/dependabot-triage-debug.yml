name: DEBUG Dependabot API Test

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: read

jobs:
  api-test:
    runs-on: ubuntu-latest
    steps:
      - name: DEBUG Direct API test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -x
          echo "=== Testing Dependabot alerts API with GITHUB_TOKEN ==="
          echo "--- Test 1: List all open alerts ---"
          gh api "repos/${REPO}/dependabot/alerts?state=open&per_page=5" --jq '.[].number' 2>&1 || true
          echo "--- Test 2: Filter by severity=critical ---"
          gh api "repos/${REPO}/dependabot/alerts?state=open&severity=critical&per_page=5" --jq '.[].number' 2>&1 || true
          echo "--- Test 3: Filter by package=fast-xml-parser ---"
          gh api "repos/${REPO}/dependabot/alerts?state=open&package=fast-xml-parser&per_page=1" --jq '.[0].security_vulnerability.severity' 2>&1 || true
          echo "--- Test 4: Filter by severity=critical&package=fast-xml-parser ---"
          gh api "repos/${REPO}/dependabot/alerts?state=open&severity=critical&package=fast-xml-parser&per_page=1" --jq '.[0].security_vulnerability.severity' 2>&1 || true
          echo "=== Done ==="
