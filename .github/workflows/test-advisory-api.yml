name: TEST Advisory API
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "=== Test 1: Advisory by GHSA ID (no auth) ==="
          curl -s https://api.github.com/advisories/GHSA-m7jm-9gc2-mpf2 | jq -r '.severity // empty'
          echo ""
          echo "=== Test 2: Advisory search by package (no auth) ==="
          curl -s 'https://api.github.com/advisories?package_name=fast-xml-parser&ecosystem=npm&severity=critical&per_page=1' | jq -r '.[0].severity // empty'
          echo ""
          echo "=== Test 3: Advisory search by package with GITHUB_TOKEN ==="
          curl -s -H "Authorization: token $GITHUB_TOKEN" 'https://api.github.com/advisories?package_name=fast-xml-parser&ecosystem=npm&severity=critical&per_page=1' | jq -r '.[0].severity // empty'
